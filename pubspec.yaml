name: thuri_cycle
description: A mobile solution that guides users on proper recycling and waste reduction in Thuringia.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # LOCALIZATION
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # FIREBASE
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

  # STATE MANAGEMENT
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.0.0

  # ROUTER
  auto_route: ^10.0.1

  # STORAGE
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # TOOLS
  get_it: ^8.0.3
  injectable: ^2.5.0
  freezed_annotation: ^3.0.0
  talker_flutter: ^4.7.1
  universal_platform: ^1.1.0
  flutter_hooks: ^0.21.2
  json_theme: ^8.0.0+2
  path_provider: ^2.1.5
  dartz: ^0.10.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  
  flutter_native_splash: ^2.4.5

  # IMAGE
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  flutter_svg: ^2.0.17
  animations: ^2.0.11
  dynamic_color: ^1.7.0

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0
  freezed: ^3.0.4
  injectable_generator: ^2.7.0
  auto_route_generator: ^10.0.1
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  assets:
    - assets/
    - assets/bottom/
