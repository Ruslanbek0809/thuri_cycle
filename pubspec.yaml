name: thuri_cycle
description: A mobile solution that guides users on proper recycling and waste reduction in Thuringia.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # LOCALIZATION
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # FIREBASE
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  google_sign_in: ^6.3.0
  sign_in_with_apple: ^7.0.1

  # STATE MANAGEMENT
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  hydrated_bloc: ^10.0.0

  # ROUTER
  auto_route: ^10.0.1

  # STORAGE
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # TOOLS
  get_it: ^8.0.3
  injectable: ^2.5.0
  freezed_annotation: ^2.4.4
  talker_flutter: ^4.7.1
  universal_platform: ^1.1.0
  flutter_hooks: ^0.21.2
  json_annotation: ^4.8.0
  json_theme: ^8.0.0+2
  path_provider: ^2.1.5
  dartz: ^0.10.1
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.7 #TODO: Check if not neeeded, remove this
  collection: ^1.19.1
  package_info_plus: ^8.3.0
  path: ^1.9.1
  
  flutter_native_splash: ^2.4.5 #TODO: Check this native splash screen before uploading the app for production
  flutter_launcher_icons: ^0.14.3

  # MAPS
  flutter_map: ^8.1.1
  geolocator: ^14.0.0
  latlong2: ^0.9.1

  # IMAGE
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  flutter_svg: ^2.0.17
  animations: ^2.0.11
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_staggered_grid_view: ^0.7.0
  modal_bottom_sheet: ^3.0.0
  material_symbols_icons: ^4.2815.0
  material_design_icons_flutter: ^7.0.7296
  dotted_border: ^2.1.0
  
dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0
  # TODO [optimization]: Upgrade freezed (with freezed_annotation) and update codes accordingly
  freezed: ^2.5.8
  injectable_generator: ^2.7.0
  auto_route_generator: ^10.0.1
  json_serializable: ^6.9.4

# Native splash screen settings.
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/app_logo.png
  # color_dark: "#19191A"
  # image_dark: assets/app_logo.png # DARK
  # background_image: assets/splash.png # LIGHT
  # background_image_dark: assets/splash.png # DARK
  # image: assets/splash.png # LIGHT
  # image_dark: assets/splash.png # DARK
  # android_12:
  #   # image: assets/logo_transparent_medium.png # LIGHT
  #   icon_background_color: "#0085FD"
  #   # image_dark: assets/logo_transparent_medium.png # DARK
  #   icon_background_color_dark: "#0085FD"
  #   # icon_background_color_dark: "#000000"
  fullscreen: true

flutter:
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  assets:
    - assets/
    - assets/bottom/
    - assets/profile/
